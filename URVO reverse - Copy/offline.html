<!DOCTYPE html>
<html>
<head>
  <title>Offline - urvo</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 2rem; text-align: center; background: #f8fafc; }
    .container { max-width: 400px; margin: 0 auto; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    .title { font-size: 1.5rem; margin-bottom: 1rem; color: #1e293b; }
    .message { color: #64748b; margin-bottom: 2rem; }
    .button { background: #3b82f6; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 0.5rem; cursor: pointer; }
    .button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📱</div>
    <h1 class="title">You're Offline</h1>
    <p class="message">Please check your internet connection and try again.</p>
    <button class="button" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
