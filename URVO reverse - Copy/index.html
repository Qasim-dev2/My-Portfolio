<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon-light.svg" />
    <link rel="manifest" href="./manifest.json" />
    <script>
      function setFavicon() {
        const darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const favicon = document.querySelector('link[rel="icon"]');
        if (favicon) {
          favicon.href = darkMode ? './favicon-dark.svg' : './favicon-light.svg';
        }
      }
      setFavicon();
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', setFavicon);
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Muhammad Qasim | Portfolio</title>
    <meta name="description" content="Portfolio of Muhammad Qasim, Computer Science Student." />

    <!-- Fonts -->
